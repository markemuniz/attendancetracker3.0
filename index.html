<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budtender Attendance Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#181a23;--surface2:#1f2230;--border:#2e3146;--border-light:#3a3d54;--text:#e8e9f0;--text-dim:#8b8ea3;--text-muted:#5c5f75;--accent:#6c8cff;--accent-dim:#4a65c7;--red:#ff6b7a;--radius:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

.login-container{width:100%;max-width:420px;padding:24px;animation:fadeUp 0.6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;box-shadow:0 20px 60px rgba(0,0,0,0.4);position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#a78bfa,#f472b6);border-radius:16px 16px 0 0}

.login-icon{width:56px;height:56px;background:rgba(108,140,255,0.1);border:1px solid rgba(108,140,255,0.2);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.login-icon svg{width:28px;height:28px;color:var(--accent)}

.login-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:800;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{text-align:center;font-size:0.85rem;color:var(--text-muted);margin-bottom:32px}

.input-group{position:relative;margin-bottom:20px}
.input-group label{display:block;font-size:0.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
.input-group input{width:100%;padding:12px 44px 12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.9rem;outline:none;transition:border-color 0.2s}
.input-group input:focus{border-color:var(--accent)}
.input-group input::placeholder{color:var(--text-muted)}
.toggle-pw{position:absolute;right:12px;top:36px;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;display:flex;align-items:center}
.toggle-pw:hover{color:var(--text-dim)}

.login-btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:0.02em}
.login-btn:hover{background:var(--accent-dim);transform:translateY(-1px);box-shadow:0 4px 16px rgba(108,140,255,0.3)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}

.error-msg{text-align:center;color:var(--red);font-size:0.82rem;margin-top:16px;display:none;animation:shake 0.4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.loading-spinner{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

.bg-glow{position:fixed;width:500px;height:500px;border-radius:50%;filter:blur(120px);opacity:0.07;pointer-events:none}
.bg-glow-1{background:var(--accent);top:-200px;left:-100px}
.bg-glow-2{background:#a78bfa;bottom:-200px;right:-100px}
</style>
</head>
<body>

<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<div class="login-container">
  <div class="login-card">
    <div class="login-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
        <circle cx="12" cy="16" r="1"/>
      </svg>
    </div>
    <h1 class="login-title">Attendance Tracker</h1>
    <p class="login-sub">Enter your password to access the tracker</p>
    
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
      <button class="toggle-pw" onclick="togglePassword()" type="button">
        <svg id="eyeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    
    <button class="login-btn" id="loginBtn" onclick="attemptDecrypt()">
      <span id="btnText">Unlock</span>
      <div class="loading-spinner" id="spinner"></div>
    </button>
    
    <div class="error-msg" id="errorMsg">Incorrect password. Please try again.</div>
  </div>
</div>

document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptDecrypt();
  document.getElementById('errorMsg').style.display = 'none';
});

function togglePassword() {
  const inp = document.getElementById('passwordInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function attemptDecrypt() {
  const password = document.getElementById('passwordInput').value;
  if (!password) return;
  
  const btn = document.getElementById('loginBtn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('spinner');
  const errorMsg = document.getElementById('errorMsg');
  
  btn.disabled = true;
  btnText.style.display = 'none';
  spinner.style.display = 'block';
  errorMsg.style.display = 'none';
  
  try {
    // Decode the base64 encrypted data
    const rawBytes = Uint8Array.from(atob(ENCRYPTED_DATA), c => c.charCodeAt(0));
    
    // OpenSSL format: "Salted__" (8) + salt (8) + ciphertext
    const salt = rawBytes.slice(8, 16);
    const ciphertext = rawBytes.slice(16);
    
    // Derive key and IV using PBKDF2 (matching openssl enc -aes-256-cbc -pbkdf2 -iter 100000)
    const passwordBytes = new TextEncoder().encode(password);
    const keyMaterial = await crypto.subtle.importKey('raw', passwordBytes, 'PBKDF2', false, ['deriveBits']);
    
    // OpenSSL with PBKDF2: derives 48 bytes (32 key + 16 IV)
    const derivedBits = await crypto.subtle.deriveBits(
      { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      384 // 48 bytes = 32 (key) + 16 (IV)
    );
    
    const derivedBytes = new Uint8Array(derivedBits);
    const key = derivedBytes.slice(0, 32);
    const iv = derivedBytes.slice(32, 48);
    
    // Import AES key
    const aesKey = await crypto.subtle.importKey('raw', key, { name: 'AES-CBC' }, false, ['decrypt']);
    
    // Decrypt
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv: iv }, aesKey, ciphertext);
    const html = new TextDecoder().decode(decrypted);
    
    // Verify it's valid HTML
    if (!html.includes('<!DOCTYPE') && !html.includes('<html') && !html.includes('<head')) {
      throw new Error('Invalid');
    }
    
    // Replace the page
    document.open();
    document.write(html);
    document.close();
    
  } catch (e) {
    console.error(e);
    btn.disabled = false;
    btnText.style.display = 'inline';
    spinner.style.display = 'none';
    errorMsg.style.display = 'block';
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
  }
}

// Auto-focus
document.getElementById('passwordInput').focus();
